<!doctype html>
<meta charset="utf-8" />
<title>debug scan</title>
<body>
  <pre id="out">loading</pre>
  <div id="strips"></div>
  <video id="video" src="__tmp_level13_regression.mp4" muted playsinline style="width: 320px"></video>
  <canvas id="frame" width="622" height="1146" hidden></canvas>
  <script>
    const REF = {
      width: 622,
      height: 1146,
      slotCentersX: [58, 141, 224, 307, 390, 473, 556],
      slotSize: 76,
    };
    const out = document.getElementById("out");
    const strips = document.getElementById("strips");
    const video = document.getElementById("video");
    const frame = document.getElementById("frame");
    const ctx = frame.getContext("2d", { willReadFrequently: true });
    const vector = document.createElement("canvas");
    vector.width = 40;
    vector.height = 40;
    const vctx = vector.getContext("2d", { willReadFrequently: true });

    function isContentPixel(r, g, b) {
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const saturation = (max - min) / Math.max(max, 1);
      const brightness = max / 255;
      const nearWhite = r > 226 && g > 226 && b > 220;
      const trayPurple = b > 70 && r > 35 && r < 135 && g < 90;
      if (nearWhite || trayPurple) return false;
      return (saturation > 0.16 && brightness > 0.26) || brightness < 0.42;
    }

    function cropFeatures(x, y, size) {
      vctx.clearRect(0, 0, 40, 40);
      vctx.drawImage(frame, x, y, size, size, 0, 0, 40, 40);
      const data = vctx.getImageData(0, 0, 40, 40).data;
      let white = 0;
      let content = 0;
      let minX = 40;
      let minY = 40;
      let maxX = -1;
      let maxY = -1;
      let edge = 0;
      for (let i = 0, p = 0; i < 1600; i += 1, p += 4) {
        const r = data[p];
        const g = data[p + 1];
        const b = data[p + 2];
        if (r > 205 && g > 205 && b > 200) white += 1;
        if (!isContentPixel(r, g, b)) continue;
        content += 1;
        const px = i % 40;
        const py = Math.floor(i / 40);
        minX = Math.min(minX, px);
        minY = Math.min(minY, py);
        maxX = Math.max(maxX, px);
        maxY = Math.max(maxY, py);
        if (px <= 2 || py <= 2 || px >= 37 || py >= 37) edge += 1;
      }
      const width = maxX >= minX ? maxX - minX + 1 : 0;
      const height = maxY >= minY ? maxY - minY + 1 : 0;
      const area = content;
      const whiteRatio = white / 1600;
      const contentRatio = content / 1600;
      const edgeContact = area ? edge / area : 0;
      const complete =
        whiteRatio >= 0.18 &&
        contentRatio >= 0.018 &&
        area >= 34 &&
        width >= 6 &&
        height >= 6 &&
        edgeContact < 0.62;
      return { whiteRatio, contentRatio, area, width, height, edgeContact, complete };
    }

    function seek(time) {
      return new Promise((resolve) => {
        video.addEventListener("seeked", resolve, { once: true });
        video.currentTime = time;
      });
    }

    function stripForY(y) {
      const canvas = document.createElement("canvas");
      canvas.width = 622;
      canvas.height = 116;
      const c = canvas.getContext("2d");
      c.drawImage(frame, 0, Math.max(0, y - 58), 622, 116, 0, 0, 622, 116);
      c.strokeStyle = "red";
      c.lineWidth = 2;
      for (const cx of REF.slotCentersX) c.strokeRect(cx - 38, 20, 76, 76);
      return canvas.toDataURL("image/png");
    }

    async function main() {
      await new Promise((resolve) => video.addEventListener("loadedmetadata", resolve, { once: true }));
      const times = [5, 15, 30, 45, 60, 75, 90, 100];
      const rows = [];
      for (const time of times) {
        await seek(Math.min(time, video.duration - 0.2));
        ctx.drawImage(video, 0, 0, 622, 1146);
        const candidates = [];
        for (let y = 80; y <= 980; y += 14) {
          let occupied = 0;
          let complete = 0;
          let whiteSum = 0;
          let contentSum = 0;
          for (const cx of REF.slotCentersX) {
            const f = cropFeatures(cx - 38, y - 38, 76);
            if (f.whiteRatio >= 0.1 && f.contentRatio >= 0.018) occupied += 1;
            if (f.complete) complete += 1;
            whiteSum += f.whiteRatio;
            contentSum += f.contentRatio;
          }
          candidates.push({
            time,
            y,
            occupied,
            complete,
            whiteAvg: whiteSum / REF.slotCentersX.length,
            contentAvg: contentSum / REF.slotCentersX.length,
          });
        }
        candidates.sort((a, b) => b.complete - a.complete || b.occupied - a.occupied || b.whiteAvg - a.whiteAvg);
        rows.push({ time, top: candidates.slice(0, 8) });
        for (const row of candidates.slice(0, 3)) {
          const img = new Image();
          img.src = stripForY(row.y);
          img.title = `t=${time} y=${row.y} complete=${row.complete} occupied=${row.occupied}`;
          img.style.display = "block";
          img.style.width = "622px";
          img.style.margin = "8px 0";
          strips.appendChild(img);
        }
      }
      out.textContent = JSON.stringify(rows, null, 2);
    }
    main().catch((error) => {
      out.textContent = error.stack || String(error);
    });
  </script>
</body>
